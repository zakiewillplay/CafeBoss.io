<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes"/>
    <meta name="description" content="Digital QR menu for cafes. Browse, choose sizes, and order instantly."/>
    <title>Royal Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --gold-light: #F5E7B5;
            --burgundy: #6D1A2D;
            --cream: #FDF3E0;
            --dark: #1A0F0A;
            --glass: rgba(20, 10, 10, 0.65);
            --light-bg: #FEFAF0;
            --light-text: #2D1A0A;
            --radius: 26px;
            --shadow: 0 18px 40px rgba(0,0,0,0.4);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--dark);
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
            transition: background 0.4s, color 0.4s;
        }
        body.light-mode {
            background: var(--light-bg);
            color: var(--light-text);
        }
        body::before {
            content: "";
            position: fixed; inset:0; z-index:0;
            background: radial-gradient(circle at 20% 30%, rgba(212,175,55,0.15) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(192,57,43,0.1) 0%, transparent 50%);
            transition: opacity 0.4s;
        }
        body.light-mode::before {
            background: radial-gradient(circle at 20% 30%, rgba(212,175,55,0.22) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(192,57,43,0.08) 0%, transparent 50%);
        }

        /* ----- MAIN WRAPPER (gentle entrance) ----- */
        .app-wrapper {
            position: relative; z-index:1;
            max-width: 620px; margin:0 auto;
            padding: 1.8rem 1rem 7rem;
            animation: fadeSlide 0.7s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }
        @keyframes fadeSlide {
            from { opacity:0; transform: translateY(36px); }
            to { opacity:1; transform: translateY(0); }
        }

        /* ----- THEME TOGGLE ----- */
        .theme-toggle {
            position: fixed; top:1.2rem; right:1.2rem; z-index:30;
            background: var(--glass); backdrop-filter: blur(16px);
            border: 1px solid var(--gold); color: var(--gold);
            padding: 0.6rem 1.1rem; border-radius: 30px; cursor: pointer;
            font-size: 0.85rem; font-weight: 600;
            box-shadow: 0 6px 18px rgba(0,0,0,0.3);
            transition: background 0.3s, transform 0.2s;
        }
        .theme-toggle:active { transform: scale(0.94); }
        body.light-mode .theme-toggle {
            background: rgba(255,255,255,0.7);
        }

        /* ----- HEADER ----- */
        .header {
            text-align: center; margin-bottom: 2rem; padding: 2rem 1.2rem;
            background: var(--glass); backdrop-filter: blur(20px);
            border: 1px solid rgba(212,175,55,0.5); border-radius: var(--radius);
            box-shadow: 0 0 45px rgba(212,175,55,0.25);
            animation: popIn 0.5s ease;
        }
        @keyframes popIn {
            0% { transform: scale(0.92); opacity:0; }
            100% { transform: scale(1); opacity:1; }
        }
        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem; color: var(--gold);
            text-shadow: 0 0 15px rgba(212,175,55,0.6);
            letter-spacing: 1px;
        }
        .header p {
            color: var(--cream); font-style: italic;
            font-size: 1rem; opacity: 0.85; margin-top: 0.3rem;
        }
        body.light-mode .header p { color: #6B4A2A; }

        /* ----- CATEGORY TABS (animated indicator) ----- */
        .tabs-sticky {
            position: sticky; top: 0.8rem; z-index:15;
            backdrop-filter: blur(22px); -webkit-backdrop-filter: blur(22px);
            padding: 0.6rem 0; margin-bottom: 1.4rem;
            display: flex; gap: 0.5rem; overflow-x: auto;
        }
        .category-tab {
            position: relative;
            background: var(--glass); border: 1px solid var(--gold);
            color: var(--gold); padding: 0.55rem 1.3rem;
            border-radius: 30px; font-size: 0.85rem; font-weight: 600;
            cursor: pointer; white-space: nowrap;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }
        .category-tab.active {
            background: var(--gold); color: var(--dark);
            box-shadow: 0 0 20px rgba(212,175,55,0.7);
            transform: translateY(-2px);
        }

        /* ----- CATEGORY CARDS (glass + hover lift) ----- */
        .category {
            background: var(--glass); backdrop-filter: blur(18px);
            border: 1px solid rgba(212,175,55,0.3); border-radius: var(--radius);
            padding: 1.5rem; margin-bottom: 1.8rem;
            box-shadow: var(--shadow);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .category:hover {
            transform: translateY(-4px);
            box-shadow: 0 24px 50px rgba(0,0,0,0.5);
        }
        .cat-title {
            font-family: 'Playfair Display', serif;
            color: var(--gold); font-size: 1.6rem;
            text-align: center; margin-bottom: 0.8rem;
            text-transform: uppercase; letter-spacing: 4px;
            border-bottom: 2px solid var(--gold); padding-bottom: 0.5rem;
        }

        /* ----- ITEM ROW (hover lift + gold glow) ----- */
        .item {
            border-bottom: 1px solid rgba(255,255,255,0.06);
            padding: 1rem 0; border-radius: 14px;
            transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
        }
        .item:hover {
            background: rgba(212,175,55,0.08);
            transform: translateX(4px);
            box-shadow: -4px 0 12px rgba(212,175,55,0.1);
        }
        .item-name {
            font-weight: 600; margin-bottom: 0.3rem;
            display: flex; align-items: center; gap: 0.5rem;
        }
        .featured-badge {
            background: linear-gradient(135deg, var(--gold), #b8922e);
            color: var(--dark); font-size: 0.7rem;
            padding: 0.2rem 0.7rem; border-radius: 14px;
            font-weight: 700; text-transform: uppercase;
            animation: softGlow 2s infinite alternate;
        }
        @keyframes softGlow {
            from { box-shadow: 0 0 6px var(--gold); }
            to { box-shadow: 0 0 18px var(--gold); }
        }
        .item-desc {
            font-size: 0.85rem; opacity: 0.65; margin-bottom: 0.4rem;
        }

        /* ----- VARIANT ROW + QTY (bounce on change) ----- */
        .variant-row {
            display: flex; align-items: center; justify-content: space-between;
            gap: 0.5rem; margin-top: 0.4rem; padding: 0.2rem 0;
        }
        .variant-name { flex:1; font-size: 0.9rem; font-weight: 500; }
        .variant-price { color: var(--gold); font-weight: 700; margin: 0 0.6rem; }
        .qty-box { display: flex; align-items: center; gap: 0.4rem; }
        .qty-btn {
            width: 36px; height: 36px; border-radius: 50%;
            border: 1px solid var(--gold); background: rgba(212,175,55,0.15);
            color: var(--gold); font-size: 1.3rem; font-weight: bold;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all 0.15s;
        }
        .qty-btn:active { background: var(--gold); color: var(--dark); transform: scale(0.9); }
        .qty-num {
            min-width: 26px; text-align: center; font-weight: 600; font-size: 1.1rem;
            transition: transform 0.2s;
        }
        .qty-num.bounce { animation: bouncePop 0.3s ease; }
        @keyframes bouncePop {
            0% { transform: scale(1); }
            50% { transform: scale(1.5); }
            100% { transform: scale(1); }
        }

        /* ----- FLOATING CART (pulse) ----- */
        #cartFloat {
            position: fixed; bottom: 2rem; right: 1.5rem; z-index: 25;
            background: var(--gold); color: var(--dark);
            padding: 0.9rem 2rem; border-radius: 40px;
            font-weight: 700; font-size: 1rem;
            box-shadow: 0 0 40px rgba(212,175,55,0.8);
            cursor: pointer; display: flex; align-items: center; gap: 0.5rem;
            transition: transform 0.2s;
        }
        #cartFloat.pulse { animation: cartPulse 0.4s ease; }
        @keyframes cartPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); }
            100% { transform: scale(1); }
        }
        #cartBadge {
            background: var(--dark); color: var(--gold);
            border-radius: 50%; width: 24px; height: 24px;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.8rem; font-weight: 700;
        }

        /* ----- CART PREVIEW (spring slide) ----- */
        #cartPreview {
            display: none; position: fixed; bottom: 6.5rem; right: 1.5rem;
            width: 92%; max-width: 360px;
            background: rgba(15,5,5,0.9); backdrop-filter: blur(30px);
            padding: 1.5rem; border-radius: 28px;
            border: 2px solid var(--gold);
            box-shadow: 0 25px 60px rgba(0,0,0,0.7); z-index: 24;
            max-height: 65vh; overflow-y: auto;
            animation: springUp 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes springUp {
            from { opacity:0; transform: translateY(40px) scale(0.9); }
            to { opacity:1; transform: translateY(0) scale(1); }
        }
        #cartPreview h4 {
            font-family: 'Playfair Display', serif; color: var(--gold);
            margin-bottom: 0.8rem; font-size: 1.2rem;
        }
        #cartItems { list-style: none; margin: 0.5rem 0; }
        #cartItems li {
            display: flex; justify-content: space-between; margin: 0.5rem 0;
            font-size: 0.9rem; border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 0.4rem;
        }
        .remove-item {
            background: none; border: none; color: var(--gold);
            cursor: pointer; font-size: 1rem; transition: transform 0.1s;
        }
        .remove-item:active { transform: scale(1.2); }
        .order-form-group { margin-top: 1rem; }
        .order-form-group label { display: block; margin-bottom: 0.3rem; font-size: 0.85rem; opacity: 0.8; }
        .order-form-group input {
            width: 100%; padding: 0.6rem; border-radius: 12px;
            border: 1px solid var(--gold); background: transparent; color: inherit;
            font-size: 0.9rem;
        }
        #orderBtn {
            width: 100%; background: var(--gold); color: var(--dark);
            border: none; padding: 0.8rem; border-radius: 30px;
            font-weight: 700; font-size: 1rem; margin-top: 0.8rem;
            cursor: pointer; transition: background 0.2s, transform 0.1s;
        }
        #orderBtn:active { transform: scale(0.96); }
        .success-message {
            text-align: center; color: var(--gold); font-weight: 600;
            margin-top: 0.5rem; display: none;
        }

        /* ----- SHARE BUTTON ----- */
        .share-btn {
            background: transparent; border: 1px solid var(--gold);
            color: var(--gold); padding: 0.6rem 1.8rem; border-radius: 30px;
            cursor: pointer; font-size: 0.9rem; margin: 1.8rem auto 0; display: block;
            transition: background 0.2s, transform 0.2s;
        }
        .share-btn:hover { background: rgba(212,175,55,0.15); transform: translateY(-2px); }
    </style>
</head>
<body>
    <button class="theme-toggle" id="themeToggle">🌓 Light</button>

    <div class="app-wrapper">
        <div class="header">
            <h1 id="cafeTitle"></h1>
            <p id="cafeDesc"></p>
        </div>

        <!-- Sticky category tabs -->
        <div class="tabs-sticky" id="categoryTabs">
            <span class="category-tab active" data-category="all">All</span>
        </div>

        <div id="menuList"></div>
        <button class="share-btn" id="shareMenuBtn">📤 Share this Menu</button>
    </div>

    <!-- Floating cart -->
    <div id="cartFloat">
        🛒 <span id="cartBadge">0</span>
    </div>

    <!-- Cart preview -->
    <div id="cartPreview">
        <h4>Your Order</h4>
        <ul id="cartItems"></ul>
        <p style="color:var(--gold); font-weight:600;">Total: ₹<span id="cartTotal">0.00</span></p>
        <div class="order-form-group">
            <label>Table Number *</label>
            <input type="text" id="tableNumber" placeholder="e.g., 12" required />
        </div>
        <div class="order-form-group">
            <label>Your Name (optional)</label>
            <input type="text" id="customerName" placeholder="e.g., Rahul" />
        </div>
        <button id="orderBtn">Place Order</button>
        <p class="success-message" id="orderSuccess"></p>
    </div>

    <script>
        const themeToggle = document.getElementById('themeToggle');
        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('light-mode');
            themeToggle.textContent = document.body.classList.contains('light-mode') ? '🌙 Dark' : '🌓 Light';
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module">
        const SUPABASE_URL = 'https://hhkuvffjjaglhutlxncm.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhoa3V2ZmZqamFnbGh1dGx4bmNtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwOTY3MzEsImV4cCI6MjA5NDY3MjczMX0.wbuGuK9hV9ie4afGuyximb7iK_g9dj9CVaXNY8guxDw';

        const init = () => {
            if (typeof supabase === 'undefined') { setTimeout(init, 100); return; }
            window.client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            main();
        };
        init();

        async function main() {
            const client = window.client;
            const params = new URLSearchParams(window.location.search);
            const cafeId = params.get('id');
            if (!cafeId) { document.body.innerHTML = '<h2>Missing cafe ID</h2>'; return; }

            const { data: cafe, error } = await client.from('cafes').select('*').eq('id', cafeId).single();
            if (error || !cafe) { document.body.innerHTML = '<h2>Cafe not found</h2>'; return; }

            try { await client.from('menu_views_log').insert({ cafe_id: cafeId }); } catch(e) {}

            document.getElementById('cafeTitle').textContent = cafe.cafe_name || 'Menu';
            document.getElementById('cafeDesc').textContent = cafe.description || '';

            const { data: items } = await client.from('menu_items').select('*').eq('cafe_id', cafeId).eq('available', true);
            const grouped = {};
            if (items) items.forEach(item => {
                if (!grouped[item.category]) grouped[item.category] = [];
                grouped[item.category].push(item);
            });

            // Build category tabs
            const tabsContainer = document.getElementById('categoryTabs');
            const sortedCats = Object.keys(grouped).sort();
            sortedCats.forEach(cat => {
                const tab = document.createElement('span');
                tab.className = 'category-tab';
                tab.textContent = cat;
                tab.dataset.category = cat;
                tabsContainer.appendChild(tab);
            });

            tabsContainer.addEventListener('click', (e) => {
                if (!e.target.classList.contains('category-tab')) return;
                document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
                e.target.classList.add('active');
                const selected = e.target.dataset.category;
                document.querySelectorAll('.category').forEach(cat => {
                    cat.style.display = (selected === 'all' || cat.dataset.cat === selected) ? 'block' : 'none';
                });
            });

            const menuList = document.getElementById('menuList');
            const cart = {};

            sortedCats.forEach(cat => {
                const section = document.createElement('div');
                section.className = 'category';
                section.dataset.cat = cat;
                section.innerHTML = `<h2 class="cat-title">${cat}</h2>`;

                grouped[cat].forEach(item => {
                    const itemDiv = document.createElement('div');
                    itemDiv.className = 'item';

                    const hasVariants = item.description && item.description.startsWith('VAR::');
                    let variants = [];
                    if (hasVariants) {
                        item.description.replace('VAR::', '').split('|').forEach(p => {
                            const [name, price] = p.split('=');
                            variants.push({ name: name.trim(), price: parseFloat(price) });
                        });
                    } else {
                        variants.push({ name: '', price: parseFloat(item.price) });
                    }

                    const featuredBadge = item.featured ? '<span class="featured-badge">🔥 Chef\'s Special</span>' : '';
                    const itemNameHtml = `<div class="item-name">${item.name} ${featuredBadge}</div>`;
                    const itemDescHtml = (hasVariants || !item.description) ? '' : `<div class="item-desc">${item.description}</div>`;

                    let variantsHtml = '';
                    variants.forEach(v => {
                        const variantName = v.name || item.name;
                        const variantId = v.name || 'default';
                        variantsHtml += `
                            <div class="variant-row" data-variant-id="${variantId}" data-price="${v.price}">
                                <span class="variant-name">${variantName}</span>
                                <span class="variant-price">₹${v.price}</span>
                                <div class="qty-box">
                                    <button class="qty-btn qty-dec">−</button>
                                    <span class="qty-num">0</span>
                                    <button class="qty-btn qty-inc">+</button>
                                </div>
                            </div>
                        `;
                    });

                    itemDiv.innerHTML = itemNameHtml + itemDescHtml + `<div class="variants-container">${variantsHtml}</div>`;
                    itemDiv.dataset.itemId = item.id;
                    itemDiv.dataset.itemName = item.name;
                    section.appendChild(itemDiv);
                });
                menuList.appendChild(section);
            });

            // Quantity + cart logic with bounce & pulse animations
            document.querySelectorAll('.item').forEach(itemDiv => {
                itemDiv.addEventListener('click', (e) => {
                    const btn = e.target;
                    if (!btn.classList.contains('qty-btn')) return;
                    const variantRow = btn.closest('.variant-row');
                    const variantId = variantRow.dataset.variantId;
                    const price = parseFloat(variantRow.dataset.price);
                    const itemId = itemDiv.dataset.itemId;
                    const itemName = itemDiv.dataset.itemName;
                    const variantName = variantRow.querySelector('.variant-name').textContent;
                    const qtySpan = variantRow.querySelector('.qty-num');
                    const cartKey = `${itemId}_${variantId}`;

                    let currentQty = cart[cartKey] ? cart[cartKey].qty : 0;
                    if (btn.classList.contains('qty-inc')) currentQty++;
                    else if (btn.classList.contains('qty-dec')) currentQty = Math.max(0, currentQty - 1);

                    if (currentQty === 0) delete cart[cartKey];
                    else cart[cartKey] = { id: itemId, name: itemName, variantName, price, qty: currentQty };

                    qtySpan.textContent = currentQty;
                    // Bounce animation on quantity number
                    qtySpan.classList.remove('bounce');
                    void qtySpan.offsetWidth;
                    qtySpan.classList.add('bounce');

                    // Pulse the floating cart button
                    const floatBtn = document.getElementById('cartFloat');
                    floatBtn.classList.remove('pulse');
                    void floatBtn.offsetWidth;
                    floatBtn.classList.add('pulse');

                    updateCartUI();
                });
            });

            const cartFloat = document.getElementById('cartFloat');
            const cartPreview = document.getElementById('cartPreview');
            const cartBadge = document.getElementById('cartBadge');
            const cartItemsEl = document.getElementById('cartItems');
            const cartTotalEl = document.getElementById('cartTotal');
            let cartVisible = false;

            cartFloat.addEventListener('click', () => {
                cartVisible = !cartVisible;
                cartPreview.style.display = cartVisible ? 'block' : 'none';
            });

            function updateCartUI() {
                const items = Object.values(cart);
                cartBadge.textContent = items.reduce((s, i) => s + i.qty, 0);
                cartTotalEl.textContent = items.reduce((s, i) => s + i.price * i.qty, 0).toFixed(2);
                cartItemsEl.innerHTML = items.map((item, idx) => `
                    <li>
                        <span>${item.name}${item.variantName && item.variantName !== item.name ? ' (' + item.variantName + ')' : ''} × ${item.qty}</span>
                        <span>₹${(item.price * item.qty).toFixed(2)}
                            <button class="remove-item" data-key="${Object.keys(cart)[idx]}">✕</button>
                        </span>
                    </li>
                `).join('');
                document.querySelectorAll('.remove-item').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const key = e.target.dataset.key;
                        delete cart[key];
                        document.querySelectorAll('.qty-num').forEach(el => el.textContent = '0');
                        Object.entries(cart).forEach(([k, v]) => {
                            const [itemId, variantId] = k.split('_');
                            const itemDiv = document.querySelector(`.item[data-item-id="${itemId}"]`);
                            if (itemDiv) {
                                const row = itemDiv.querySelector(`.variant-row[data-variant-id="${variantId}"]`);
                                if (row) row.querySelector('.qty-num').textContent = v.qty;
                            }
                        });
                        updateCartUI();
                    });
                });
            }

            // Place order & wait for acceptance
            document.getElementById('orderBtn').addEventListener('click', async () => {
                const items = Object.values(cart);
                if (items.length === 0) return alert('Cart is empty');
                const tableNumber = document.getElementById('tableNumber').value.trim();
                if (!tableNumber) return alert('Please enter your table number');
                const customerName = document.getElementById('customerName').value.trim() || 'Guest';
                const total = items.reduce((s, i) => s + i.price * i.qty, 0).toFixed(2);

                try {
                    const { data: newOrder, error } = await client.from('orders').insert({
                        cafe_id: cafeId,
                        customer_name: customerName,
                        table_number: tableNumber,
                        items: items.map(i => ({ name: i.name, variant: i.variantName || '', price: i.price, qty: i.qty })),
                        total: parseFloat(total),
                        status: 'new'
                    }).select('id').single();
                    if (error) throw error;

                    const orderId = newOrder.id;
                    document.getElementById('orderSuccess').textContent = '✅ Order placed! Waiting for confirmation…';
                    document.getElementById('orderSuccess').style.display = 'block';

                    for (const key in cart) delete cart[key];
                    document.querySelectorAll('.qty-num').forEach(el => el.textContent = '0');
                    updateCartUI();

                    let pollInterval = setInterval(async () => {
                        const { data: order } = await client.from('orders').select('status').eq('id', orderId).single();
                        if (order && order.status === 'accepted') {
                            clearInterval(pollInterval);
                            document.getElementById('orderSuccess').textContent = '🎉 Order accepted! Enjoy your meal!';
                            document.getElementById('orderSuccess').style.color = '#4CAF50';
                            if (Notification.permission === 'default') await Notification.requestPermission();
                            if (Notification.permission === 'granted') new Notification('Order Accepted!', { body: 'Your order has been accepted by the cafe.', icon: cafe.logo_url || '' });
                            setTimeout(() => {
                                cartPreview.style.display = 'none';
                                cartVisible = false;
                                document.getElementById('orderSuccess').style.display = 'none';
                            }, 4000);
                        }
                    }, 5000);
                } catch (err) {
                    alert('Order failed. Please try again.');
                    console.error(err);
                }
            });

            document.getElementById('shareMenuBtn').addEventListener('click', () => {
                const url = window.location.href;
                if (navigator.share) {
                    navigator.share({ title: cafe.cafe_name, text: 'Check out our menu!', url }).catch(() => {});
                } else {
                    navigator.clipboard.writeText(url).then(() => alert('Menu link copied!')).catch(() => {});
                }
            });
        }
    </script>
</body>
</html>
