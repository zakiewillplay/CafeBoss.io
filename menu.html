<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes"/>
    <title>Royal Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #E5C158;
            --gold-light: #F9EEC1;
            --dark: #0D0B09;
            --card-bg: rgba(20, 18, 15, 0.8);
            --light-bg: #FEFAF0;
            --light-text: #2D1A0A;
            --radius: 22px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0A0806;
            color: #fff;
            min-height: 100vh; overflow-x: hidden;
            transition: background 0.4s, color 0.4s; line-height: 1.6;
            background-image: 
                linear-gradient(rgba(229,193,88,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(229,193,88,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        body.light-mode {
            background: var(--light-bg);
            color: var(--light-text);
            background-image: none;
        }

        /* Shimmer entrance */
        .page-loader {
            position: fixed; inset:0; z-index:100; background: #0A0806;
            display: flex; align-items: center; justify-content: center;
            transition: opacity 0.5s ease 0.6s, visibility 0.5s ease 0.6s;
        }
        .page-loader.hidden { opacity:0; visibility:hidden; }
        .loader-plate {
            width: 100px; height: 100px;
            border: 3px solid var(--gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            border-top-color: transparent;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .app-wrapper {
            position: relative; z-index:1; max-width: 640px; margin:0 auto;
            padding: 2rem 1rem 7rem; opacity:0; transform: translateY(20px);
            transition: opacity 0.5s ease 0.8s, transform 0.5s ease 0.8s;
        }
        .app-wrapper.visible { opacity:1; transform: translateY(0); }

        /* Theme toggle */
        .theme-toggle {
            position: fixed; top:1.2rem; right:1.2rem; z-index:30;
            background: rgba(20,18,15,0.8); backdrop-filter: blur(20px);
            border:1px solid var(--gold); color:var(--gold);
            padding:0.6rem 1.2rem; border-radius:30px; cursor:pointer;
            font-size:0.85rem; font-weight:600; box-shadow:0 6px 18px rgba(0,0,0,0.5);
        }

        /* Header */
        .header {
            text-align: center; margin-bottom: 2rem; padding: 2.5rem 1.5rem;
            background: var(--card-bg); backdrop-filter: blur(24px);
            border: 1px solid rgba(229,193,88,0.4); border-radius: var(--radius);
            box-shadow: 0 0 60px rgba(229,193,88,0.15);
            animation: fadeSlideUp 0.5s ease;
        }
        @keyframes fadeSlideUp { from { opacity:0; transform: translateY(30px); } to { opacity:1; transform: translateY(0); } }
        .header h1 {
            font-family: 'Libre Baskerville', serif;
            font-size: 2.8rem; color: var(--gold);
            text-shadow: 0 0 20px rgba(229,193,88,0.6);
            letter-spacing: 1px;
        }
        .header p { font-size: 1.1rem; opacity: 0.8; margin-top: 0.4rem; color: var(--gold-light); font-style: italic; }

        /* Category tabs – underlined style */
        .tabs-sticky {
            position: sticky; top: 0.8rem; z-index:15;
            backdrop-filter: blur(25px); padding: 0.8rem 0; margin-bottom: 1.5rem;
            display: flex; gap: 1rem; overflow-x: auto; border-bottom: 1px solid rgba(229,193,88,0.3);
        }
        .category-tab {
            background: none; border: none; color: rgba(229,193,88,0.7);
            padding: 0.5rem 1.2rem; font-size: 1rem; font-weight: 600;
            cursor: pointer; white-space: nowrap; position: relative;
            transition: color 0.2s;
            font-family: 'Inter', sans-serif;
        }
        .category-tab::after {
            content: ''; position: absolute; bottom: -1px; left: 0; right: 0;
            height: 3px; background: var(--gold); transform: scaleX(0);
            transition: transform 0.3s;
        }
        .category-tab.active { color: var(--gold); }
        .category-tab.active::after { transform: scaleX(1); }

        /* Category cards */
        .category {
            background: var(--card-bg); backdrop-filter: blur(20px);
            border: 1px solid rgba(229,193,88,0.3); border-radius: var(--radius);
            padding: 1.8rem; margin-bottom: 2rem;
            box-shadow: 0 20px 45px rgba(0,0,0,0.5);
            opacity: 0; animation: cardReveal 0.5s ease forwards;
        }
        .category:nth-child(1) { animation-delay: 0.1s; }
        .category:nth-child(2) { animation-delay: 0.2s; }
        .category:nth-child(3) { animation-delay: 0.3s; }
        .category:nth-child(4) { animation-delay: 0.4s; }
        .category:nth-child(5) { animation-delay: 0.5s; }
        @keyframes cardReveal { from { opacity:0; transform: translateY(30px); } to { opacity:1; transform: translateY(0); } }
        .cat-title {
            font-family: 'Libre Baskerville', serif;
            color: var(--gold); font-size: 1.8rem;
            text-align: center; margin-bottom: 1rem;
            text-transform: uppercase; letter-spacing: 3px;
        }

        /* Item row */
        .item {
            display: flex; align-items: flex-start; justify-content: space-between;
            padding: 1.2rem 0.4rem; border-bottom: 1px solid rgba(255,255,255,0.05);
            border-radius: 14px; transition: background 0.2s, transform 0.2s;
            opacity: 0; animation: itemPop 0.4s ease forwards;
        }
        .item:nth-child(1) { animation-delay: 0.1s; } .item:nth-child(2) { animation-delay: 0.15s; }
        .item:nth-child(3) { animation-delay: 0.2s; } .item:nth-child(4) { animation-delay: 0.25s; }
        .item:nth-child(5) { animation-delay: 0.3s; } .item:nth-child(6) { animation-delay: 0.35s; }
        @keyframes itemPop { from { opacity:0; transform: scale(0.95); } to { opacity:1; transform: scale(1); } }
        .item:hover { background: rgba(229,193,88,0.06); transform: translateX(4px); }
        .item-info { flex: 1; min-width: 0; }
        .item-name { font-family: 'Libre Baskerville', serif; font-size: 1.2rem; font-weight: 700; margin-bottom: 0.2rem; color: #fff; }
        .item-desc { font-size: 0.9rem; opacity: 0.65; margin-bottom: 0.6rem; }

        /* Variant pills */
        .variant-pills { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 0.5rem; }
        .variant-pill {
            background: rgba(229,193,88,0.08); border: 1px solid rgba(229,193,88,0.4);
            border-radius: 30px; padding: 0.4rem 1.1rem; font-size: 0.85rem; font-weight: 600;
            color: var(--gold); cursor: pointer; transition: all 0.2s; white-space: nowrap;
        }
        .variant-pill.selected { background: var(--gold); color: #0A0806; box-shadow: 0 0 18px rgba(229,193,88,0.5); }

        /* Quantity controls */
        .qty-row { display: flex; align-items: center; gap: 0.6rem; margin-top: 0.5rem; }
        .qty-btn {
            width: 42px; height: 42px; border: 1px solid var(--gold);
            background: rgba(229,193,88,0.1); color: var(--gold);
            border-radius: 15px; font-size: 1.5rem; font-weight: bold;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all 0.1s;
        }
        .qty-btn:active { background: var(--gold); color: #0A0806; transform: scale(0.85); box-shadow: 0 0 15px var(--gold); }
        .qty-num { min-width: 28px; text-align: center; font-weight: 700; font-size: 1.2rem; transition: transform 0.2s; }
        .qty-num.bounce { animation: bounceNum 0.35s ease; }
        @keyframes bounceNum { 0% { transform: scale(1); } 50% { transform: scale(1.6); } 100% { transform: scale(1); } }

        /* Floating cart */
        #cartFloat {
            position: fixed; bottom: 2rem; right: 1.5rem; z-index: 25;
            background: var(--gold); color: #0A0806;
            padding: 0.9rem 2rem; border-radius: 35px;
            font-weight: 700; font-size: 1.1rem;
            box-shadow: 0 0 40px rgba(229,193,88,0.7);
            cursor: pointer; display: flex; align-items: center; gap: 0.6rem;
            transition: transform 0.2s;
        }
        #cartFloat.pulse { animation: cartPop 0.4s ease; }
        @keyframes cartPop { 0% { transform: scale(1); } 50% { transform: scale(1.12); } 100% { transform: scale(1); } }
        #cartBadge { background: #0A0806; color: var(--gold); border-radius: 50%; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; font-weight: 700; }

        /* Cart preview */
        #cartPreview {
            display: none; position: fixed; bottom: 7rem; right: 1.5rem;
            width: 92%; max-width: 380px;
            background: rgba(10,8,6,0.92); backdrop-filter: blur(30px);
            padding: 1.6rem; border-radius: 28px; border: 2px solid var(--gold);
            box-shadow: 0 25px 65px rgba(0,0,0,0.8); z-index: 24;
            max-height: 65vh; overflow-y: auto;
            animation: springUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes springUp { from { opacity:0; transform: translateY(40px) scale(0.9); } to { opacity:1; transform: translateY(0) scale(1); } }
        #cartPreview h4 { font-family: 'Libre Baskerville', serif; color: var(--gold); margin-bottom: 0.8rem; font-size: 1.3rem; }
        #cartItems { list-style: none; margin: 0.5rem 0; }
        #cartItems li { display: flex; justify-content: space-between; margin: 0.5rem 0; font-size: 0.95rem; border-bottom: 1px solid rgba(255,255,255,0.08); padding-bottom: 0.4rem; }
        .remove-item { background: none; border: none; color: var(--gold); cursor: pointer; font-size: 1.2rem; }
        .order-form-group { margin-top: 1rem; }
        .order-form-group label { display: block; margin-bottom: 0.3rem; font-size: 0.85rem; opacity: 0.8; }
        .order-form-group input { width: 100%; padding: 0.7rem; border-radius: 14px; border: 1px solid var(--gold); background: transparent; color: inherit; font-size: 0.95rem; }
        #orderBtn { width: 100%; background: var(--gold); color: #0A0806; border: none; padding: 0.85rem; border-radius: 30px; font-weight: 700; font-size: 1.1rem; margin-top: 0.8rem; cursor: pointer; }
        .success-message { text-align: center; color: var(--gold); font-weight: 600; margin-top: 0.5rem; display: none; }

        .share-btn {
            background: transparent; border: 1px solid var(--gold); color: var(--gold);
            padding: 0.7rem 2rem; border-radius: 30px; cursor: pointer; font-size: 0.9rem;
            margin: 2rem auto 0; display: block; transition: background 0.2s;
        }
    </style>
</head>
<body>
    <div class="page-loader" id="pageLoader"><div class="loader-plate"></div></div>
    <button class="theme-toggle" id="themeToggle">🌓 Light</button>

    <div class="app-wrapper" id="menuContent">
        <div class="header">
            <h1 id="cafeTitle"></h1>
            <p id="cafeDesc"></p>
        </div>

        <div class="tabs-sticky" id="categoryTabs">
            <span class="category-tab active" data-category="all">All</span>
        </div>

        <div id="menuList"></div>
        <button class="share-btn" id="shareMenuBtn">📤 Share this Menu</button>
    </div>

    <div id="cartFloat">🛒 <span id="cartBadge">0</span></div>
    <div id="cartPreview">
        <h4>Your Order</h4>
        <ul id="cartItems"></ul>
        <p style="color:var(--gold);font-weight:600;">Total: ₹<span id="cartTotal">0.00</span></p>
        <div class="order-form-group"><label>Table Number *</label><input type="text" id="tableNumber" placeholder="e.g., 12" required /></div>
        <div class="order-form-group"><label>Your Name (optional)</label><input type="text" id="customerName" placeholder="e.g., Rahul" /></div>
        <button id="orderBtn">Place Order</button>
        <p class="success-message" id="orderSuccess"></p>
    </div>

    <script>
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('pageLoader').classList.add('hidden');
                document.getElementById('menuContent').classList.add('visible');
            }, 1800);
        });
        const themeToggle = document.getElementById('themeToggle');
        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('light-mode');
            themeToggle.textContent = document.body.classList.contains('light-mode') ? '🌙 Dark' : '🌓 Light';
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module">
        const SUPABASE_URL = 'https://hhkuvffjjaglhutlxncm.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhoa3V2ZmZqamFnbGh1dGx4bmNtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwOTY3MzEsImV4cCI6MjA5NDY3MjczMX0.wbuGuK9hV9ie4afGuyximb7iK_g9dj9CVaXNY8guxDw';

        const init = () => {
            if (typeof supabase === 'undefined') { setTimeout(init, 100); return; }
            window.client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            main();
        };
        init();

        async function main() {
            const client = window.client;
            const params = new URLSearchParams(window.location.search);
            const cafeId = params.get('id');
            if (!cafeId) { document.body.innerHTML = '<h2>Missing cafe ID</h2>'; return; }

            const { data: cafe, error } = await client.from('cafes').select('*').eq('id', cafeId).single();
            if (error || !cafe) { document.body.innerHTML = '<h2>Cafe not found</h2>'; return; }

            try { await client.from('menu_views_log').insert({ cafe_id: cafeId }); } catch(e) {}

            document.getElementById('cafeTitle').textContent = cafe.cafe_name || 'Menu';
            document.getElementById('cafeDesc').textContent = cafe.description || '';

            const { data: items } = await client.from('menu_items').select('*').eq('cafe_id', cafeId).eq('available', true);
            const grouped = {};
            if (items) items.forEach(item => {
                if (!grouped[item.category]) grouped[item.category] = [];
                grouped[item.category].push(item);
            });

            const tabsContainer = document.getElementById('categoryTabs');
            const sortedCats = Object.keys(grouped).sort();
            sortedCats.forEach(cat => {
                const tab = document.createElement('span');
                tab.className = 'category-tab';
                tab.textContent = cat;
                tab.dataset.category = cat;
                tabsContainer.appendChild(tab);
            });

            tabsContainer.addEventListener('click', (e) => {
                if (!e.target.classList.contains('category-tab')) return;
                document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
                e.target.classList.add('active');
                const selected = e.target.dataset.category;
                document.querySelectorAll('.category').forEach(cat => {
                    cat.style.display = (selected === 'all' || cat.dataset.cat === selected) ? 'block' : 'none';
                });
            });

            const menuList = document.getElementById('menuList');
            const cart = {};
            const selectedVariants = {};

            sortedCats.forEach(cat => {
                const section = document.createElement('div');
                section.className = 'category';
                section.dataset.cat = cat;
                section.innerHTML = `<h2 class="cat-title">${cat}</h2>`;

                grouped[cat].forEach(item => {
                    const itemDiv = document.createElement('div');
                    itemDiv.className = 'item';
                    itemDiv.dataset.itemId = item.id;
                    itemDiv.dataset.itemName = item.name;

                    const hasVariants = item.description && item.description.startsWith('VAR::');
                    let variants = [];
                    if (hasVariants) {
                        item.description.replace('VAR::', '').split('|').forEach(p => {
                            const [name, price] = p.split('=');
                            variants.push({ name: name.trim(), price: parseFloat(price) });
                        });
                    } else {
                        variants.push({ name: '', price: parseFloat(item.price) });
                    }

                    selectedVariants[item.id] = 0;
                    const featuredBadge = item.featured ? '<span style="background:linear-gradient(135deg,var(--gold),#b8922e);color:#0A0806;font-size:0.7rem;padding:0.2rem 0.7rem;border-radius:14px;font-weight:700;text-transform:uppercase;margin-left:0.5rem;">🔥 Chef\'s Special</span>' : '';
                    const itemDescHtml = (!hasVariants && item.description) ? `<div class="item-desc">${item.description}</div>` : '';

                    let variantPillsHtml = '';
                    if (variants.length > 1) {
                        variantPillsHtml = '<div class="variant-pills">';
                        variants.forEach((v, idx) => {
                            variantPillsHtml += `<span class="variant-pill ${idx === 0 ? 'selected' : ''}" data-index="${idx}">${v.name}<span style="margin-left:0.3rem;font-weight:700;">₹${v.price}</span></span>`;
                        });
                        variantPillsHtml += '</div>';
                    }

                    const singlePriceHtml = variants.length === 1 ? `<span style="color:var(--gold);font-weight:700;font-size:1.1rem;">₹${variants[0].price}</span>` : '';

                    const qtyHtml = `<div class="qty-row"><button class="qty-btn qty-dec">−</button><span class="qty-num">0</span><button class="qty-btn qty-inc">+</button></div>`;

                    itemDiv.innerHTML = `<div class="item-info"><div class="item-name">${item.name}${featuredBadge}</div>${itemDescHtml}${variantPillsHtml}<div style="display:flex;align-items:center;justify-content:space-between;">${singlePriceHtml}</div></div>${qtyHtml}`;

                    if (variants.length > 1) {
                        const pills = itemDiv.querySelectorAll('.variant-pill');
                        pills.forEach(pill => {
                            pill.addEventListener('click', (e) => {
                                pills.forEach(p => p.classList.remove('selected'));
                                pill.classList.add('selected');
                                const idx = parseInt(pill.dataset.index);
                                selectedVariants[item.id] = idx;
                                const qtySpan = itemDiv.querySelector('.qty-num');
                                const vKey = `${item.id}_${variants[idx].name}`;
                                qtySpan.textContent = cart[vKey] ? cart[vKey].qty : 0;
                            });
                        });
                    }

                    const qtyDec = itemDiv.querySelector('.qty-dec');
                    const qtyInc = itemDiv.querySelector('.qty-inc');
                    const qtySpan = itemDiv.querySelector('.qty-num');

                    const updateQty = (delta) => {
                        const vIdx = selectedVariants[item.id] || 0;
                        const v = variants[vIdx];
                        const cartKey = `${item.id}_${v.name}`;
                        let cur = cart[cartKey] ? cart[cartKey].qty : 0;
                        cur = Math.max(0, cur + delta);
                        if (cur === 0) { delete cart[cartKey]; }
                        else { cart[cartKey] = { id: item.id, name: item.name, variantName: v.name, price: v.price, qty: cur }; }
                        qtySpan.textContent = cur;
                        qtySpan.classList.remove('bounce'); void qtySpan.offsetWidth; qtySpan.classList.add('bounce');
                        const fb = document.getElementById('cartFloat');
                        fb.classList.remove('pulse'); void fb.offsetWidth; fb.classList.add('pulse');
                        updateCartUI();
                    };
                    qtyDec.addEventListener('click', () => updateQty(-1));
                    qtyInc.addEventListener('click', () => updateQty(1));
                    section.appendChild(itemDiv);
                });
                menuList.appendChild(section);
            });

            const cartFloat = document.getElementById('cartFloat');
            const cartPreview = document.getElementById('cartPreview');
            const cartBadge = document.getElementById('cartBadge');
            const cartItemsEl = document.getElementById('cartItems');
            const cartTotalEl = document.getElementById('cartTotal');
            let cartVisible = false;
            cartFloat.addEventListener('click', () => { cartVisible = !cartVisible; cartPreview.style.display = cartVisible ? 'block' : 'none'; });

            function updateCartUI() {
                const items = Object.values(cart);
                cartBadge.textContent = items.reduce((s, i) => s + i.qty, 0);
                cartTotalEl.textContent = items.reduce((s, i) => s + i.price * i.qty, 0).toFixed(2);
                cartItemsEl.innerHTML = items.map((item, idx) => `<li><span>${item.name}${item.variantName ? ' (' + item.variantName + ')' : ''} × ${item.qty}</span><span>₹${(item.price * item.qty).toFixed(2)}<button class="remove-item" data-key="${Object.keys(cart)[idx]}">✕</button></span></li>`).join('');
                document.querySelectorAll('.remove-item').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const key = e.target.dataset.key; delete cart[key];
                        document.querySelectorAll('.item').forEach(itemDiv => {
                            const itemId = itemDiv.dataset.itemId;
                            const vIdx = selectedVariants[itemId] || 0;
                            const pills = itemDiv.querySelectorAll('.variant-pill');
                            let vName = '';
                            if (pills.length) { const active = itemDiv.querySelector('.variant-pill.selected'); if (active) vName = active.textContent.split(' ')[0].trim(); }
                            else { vName = ''; }
                            const ck = `${itemId}_${vName}`;
                            itemDiv.querySelector('.qty-num').textContent = cart[ck] ? cart[ck].qty : 0;
                        });
                        updateCartUI();
                    });
                });
            }

            document.getElementById('orderBtn').addEventListener('click', async () => {
                const items = Object.values(cart);
                if (items.length === 0) return alert('Cart is empty');
                const tableNumber = document.getElementById('tableNumber').value.trim();
                if (!tableNumber) return alert('Please enter your table number');
                const customerName = document.getElementById('customerName').value.trim() || 'Guest';
                const total = items.reduce((s, i) => s + i.price * i.qty, 0).toFixed(2);
                try {
                    const { data: newOrder, error } = await client.from('orders').insert({ cafe_id: cafeId, customer_name: customerName, table_number: tableNumber, items: items.map(i => ({ name: i.name, variant: i.variantName || '', price: i.price, qty: i.qty })), total: parseFloat(total), status: 'new' }).select('id').single();
                    if (error) throw error;
                    const orderId = newOrder.id;
                    document.getElementById('orderSuccess').textContent = '✅ Order placed! Waiting for confirmation…';
                    document.getElementById('orderSuccess').style.display = 'block';
                    for (const key in cart) delete cart[key];
                    document.querySelectorAll('.qty-num').forEach(el => el.textContent = '0');
                    updateCartUI();
                    let pollInterval = setInterval(async () => {
                        const { data: order } = await client.from('orders').select('status').eq('id', orderId).single();
                        if (order && order.status === 'accepted') {
                            clearInterval(pollInterval);
                            document.getElementById('orderSuccess').textContent = '🎉 Order accepted! Enjoy your meal!';
                            document.getElementById('orderSuccess').style.color = '#4CAF50';
                            if (Notification.permission === 'default') await Notification.requestPermission();
                            if (Notification.permission === 'granted') new Notification('Order Accepted!', { body: 'Your order has been accepted by the cafe.', icon: cafe.logo_url || '' });
                            setTimeout(() => { cartPreview.style.display = 'none'; cartVisible = false; document.getElementById('orderSuccess').style.display = 'none'; }, 4000);
                        }
                    }, 5000);
                } catch (err) { alert('Order failed. Please try again.'); console.error(err); }
            });

            document.getElementById('shareMenuBtn').addEventListener('click', () => {
                const url = window.location.href;
                if (navigator.share) { navigator.share({ title: cafe.cafe_name, text: 'Check out our menu!', url }).catch(() => {}); }
                else { navigator.clipboard.writeText(url).then(() => alert('Menu link copied!')).catch(() => {}); }
            });
        }
    </script>
</body>
</html>
